<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTube Shorts Fetch</title>
</head>
<body>
  <h1>Shorts動画取得</h1>
  <button onclick="fetchShorts()">取得</button>
  <ul id="list"></ul>

  <script>
    const API_KEY = "AIzaSyDxg4ziMu2rbUG8wKR5z9qUfQX_l4iv-Uk";

    async function fetchShorts() {
      const res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&q=shorts&type=video&videoDuration=short&maxResults=10&key=${API_KEY}`
      );
      const data = await res.json();

      const list = document.getElementById("list");
      list.innerHTML = "";

      data.items.forEach(item => {
        const videoId = item.id.videoId;
        const url = `https://www.youtube.com/shorts/${videoId}`;

        const li = document.createElement("li");
        li.innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
        list.appendChild(li);
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTube Shorts TikTok風</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #video-container {
      width: 100%;
      height: 100vh;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
    }
    .short-video {
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    iframe {
      width: 360px;
      height: 640px;
      border: none;
    }
  </style>
</head>
<body>

<div id="video-container"></div>

<script>
const API_KEY = "YOUR_API_KEY"; // ここにAPIキー
const MAX_VIDEOS = 20; // 一度に取得する動画数
let videoList = [];
let currentIndex = 0;

// YouTube APIでショート動画を取得
async function fetchShorts() {
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=shorts&type=video&videoDuration=short&maxResults=${MAX_VIDEOS}&key=${API_KEY}`
  );
  const data = await res.json();
  videoList = data.items.map(item => `https://www.youtube.com/embed/${item.id.videoId}?autoplay=1&controls=0&loop=1&playlist=${item.id.videoId}`);
  shuffleArray(videoList); // ランダム順に
  renderVideos();
}

// 配列をランダムに並び替え
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// 動画をDOMに追加
function renderVideos() {
  const container = document.getElementById("video-container");
  container.innerHTML = "";
  videoList.forEach(src => {
    const div = document.createElement("div");
    div.className = "short-video";
    div.innerHTML = `<iframe src="${src}" allow="autoplay; fullscreen"></iframe>`;
    container.appendChild(div);
  });
}

// スクロールで次の動画に自動フォーカス
document.getElementById("video-container").addEventListener("scroll", () => {
  const container = document.getElementById("video-container");
  const scrollTop = container.scrollTop;
  const height = window.innerHeight;
  const index = Math.round(scrollTop / height);
  if (index !== currentIndex) {
    currentIndex = index;
    // ここで必要なら動画の再生・停止を制御可能
  }
});

// 初期ロード
fetchShorts();
</script>
</body>
</html>

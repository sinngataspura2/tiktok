<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTube Shorts TikTok風</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    #video-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      scroll-snap-align: start;
    }

    .player {
      width: 360px;
      height: 640px;
    }
  </style>
</head>
<body>

<div id="video-container"></div>

<!-- YouTube Iframe API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API_KEY = "YOUR_API_KEY";
let players = [];
let videoIds = [];
let currentIndex = 0;

// Shorts取得
async function fetchShorts() {
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=shorts&type=video&videoDuration=short&maxResults=10&key=${API_KEY}`
  );
  const data = await res.json();

  videoIds = data.items.map(item => item.id.videoId);
  shuffle(videoIds);
  createPlayers();
}

// シャッフル
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// プレイヤー作成
function createPlayers() {
  const container = document.getElementById("video-container");
  container.innerHTML = "";

  videoIds.forEach((id, index) => {
    const div = document.createElement("div");
    div.className = "video";
    div.innerHTML = `<div id="player-${index}" class="player"></div>`;
    container.appendChild(div);
  });
}

// API準備完了後に呼ばれる
function onYouTubeIframeAPIReady() {
  fetchShorts();
}

// プレイヤー生成
function loadPlayers() {
  players = videoIds.map((id, index) => {
    return new YT.Player(`player-${index}`, {
      videoId: id,
      playerVars: {
        autoplay: 0,
        controls: 0,
        modestbranding: 1,
        loop: 1,
        playlist: id
      }
    });
  });

  // 最初の動画だけ再生
  setTimeout(() => {
    players[0].playVideo();
  }, 1000);
}

// DOM更新後にプレイヤー作る
const observer = new MutationObserver(() => {
  if (videoIds.length && document.querySelectorAll(".player").length) {
    loadPlayers();
    observer.disconnect();
  }
});
observer.observe(document.getElementById("video-container"), { childList: true });

// スクロール制御
document.getElementById("video-container").addEventListener("scroll", () => {
  const container = document.getElementById("video-container");
  const index = Math.round(container.scrollTop / window.innerHeight);

  if (index !== currentIndex && players[index]) {
    // 前の動画停止
    if (players[currentIndex]) {
      players[currentIndex].pauseVideo();
    }

    // 新しい動画再生
    players[index].playVideo();
    currentIndex = index;

    // 無限スクロール（最後で追加）
    if (index === videoIds.length - 1) {
      fetchMore();
    }
  }
});

// 追加ロード（無限スクロール）
async function fetchMore() {
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=shorts&type=video&videoDuration=short&maxResults=5&key=${API_KEY}`
  );
  const data = await res.json();

  const newIds = data.items.map(item => item.id.videoId);
  videoIds = videoIds.concat(newIds);

  createPlayers();
  loadPlayers();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTube Shorts TikTok風 (音声トグル・重複排除)</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #video-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      scroll-snap-align: start;
    }

    .player {
      width: 360px;
      height: 640px;
    }

    /* 右下スピーカーアイコン */
    #audio-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      background: rgba(255,0,0,0.8);
      color: #fff;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div id="video-container"></div>
<button id="audio-btn">🔇</button>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API_KEY = "AIzaSyDxg4ziMu2rbUG8wKR5z9qUfQX_l4iv-Uk";
let players = [];
let videoIds = [];
let currentIndex = 0;
let playedIds = new Set(); // 再生済みID保持
let isMuted = true;

// 日本系ショート動画を取得（重複排除）
async function fetchShorts(maxResults = 10) {
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=ショート動画&type=video&videoDuration=short&maxResults=${maxResults}&regionCode=JP&relevanceLanguage=ja&key=${API_KEY}`
  );
  const data = await res.json();

  const newIds = data.items
    .map(item => item.id.videoId)
    .filter(id => !playedIds.has(id)); // 重複排除

  videoIds = videoIds.concat(newIds);
  newIds.forEach(id => playedIds.add(id));

  shuffle(videoIds);
  renderVideos();
  loadPlayers();
}

// 配列シャッフル
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// DOMにプレイヤー追加
function renderVideos() {
  const container = document.getElementById("video-container");
  container.innerHTML = "";
  videoIds.forEach((id, index) => {
    const div = document.createElement("div");
    div.className = "video";
    div.innerHTML = `<div id="player-${index}" class="player"></div>`;
    container.appendChild(div);
  });
}

// Iframe API準備完了
function onYouTubeIframeAPIReady() {
  fetchShorts();
}

// プレイヤー生成
function loadPlayers() {
  players = videoIds.map((id, index) => {
    return new YT.Player(`player-${index}`, {
      videoId: id,
      playerVars: {
        autoplay: 1,
        controls: 0,
        modestbranding: 1,
        loop: 1,
        playlist: id
      },
      events: {
        'onReady': (event) => {
          if (isMuted) event.target.mute();
          else event.target.unMute();
          if (index === 0) event.target.playVideo();
        }
      }
    });
  });
}

// スクロールで動画切替
document.getElementById("video-container").addEventListener("scroll", () => {
  const container = document.getElementById("video-container");
  const index = Math.round(container.scrollTop / window.innerHeight);

  if (index !== currentIndex && players[index]) {
    if (players[currentIndex]) players[currentIndex].pauseVideo();
    players[index].playVideo();
    currentIndex = index;

    // 無限スクロール
    if (index >= videoIds.length - 3) fetchShorts(5);
  }
});

// 音声トグルボタン
const audioBtn = document.getElementById("audio-btn");
audioBtn.addEventListener("click", () => {
  isMuted = !isMuted;
  players.forEach(player => {
    if (isMuted) player.mute();
    else player.unMute();
  });
  // アイコン切替
  audioBtn.textContent = isMuted ? "🔇" : "🔊";
});
</script>
</body>
</html>

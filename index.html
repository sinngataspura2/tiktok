<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YouTube Shorts TikTok風 (重複防止 + 音声トグル)</title>
<style>
  body, html { margin:0; padding:0; overflow:hidden; background:#000; font-family:sans-serif;}
  #video-container { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory;}
  .video { height:100vh; display:flex; justify-content:center; align-items:center; scroll-snap-align:start;}
  .player { width:360px; height:640px;}
  #audio-btn {
    position:fixed; bottom:20px; right:20px; width:40px; height:40px; font-size:20px;
    cursor:pointer; background:rgba(255,0,0,0.8); color:#fff; border:none; border-radius:50%;
    display:flex; align-items:center; justify-content:center; z-index:1000;
  }
</style>
</head>
<body>

<div id="video-container"></div>
<button id="audio-btn">🔇</button>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_KEY = "AIzaSyDxg4ziMu2rbUG8wKR5z9qUfQX_l4iv-Uk";
let players = [];
let videoIds = [];
let currentIndex = -1;
let isMuted = true;

// localStorage から再生済みIDを取得
let playedIds = new Set(JSON.parse(localStorage.getItem('playedIds') || "[]"));

// 日本系ショート動画取得（重複排除）
async function fetchShorts(maxResults=10){
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=ショート動画&type=video&videoDuration=short&maxResults=${maxResults}&regionCode=JP&relevanceLanguage=ja&key=${API_KEY}`
  );
  const data = await res.json();

  const newIds = data.items.map(item=>item.id.videoId)
                     .filter(id=>!playedIds.has(id));
  if(newIds.length===0) return;

  newIds.forEach(id=>{
    playedIds.add(id);
  });
  // localStorage 更新
  localStorage.setItem('playedIds', JSON.stringify([...playedIds]));

  videoIds = videoIds.concat(newIds);
  shuffle(videoIds);
  renderVideos();
  loadPlayers();
}

// 配列シャッフル
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

// DOMにプレイヤー追加
function renderVideos(){
  const container=document.getElementById("video-container");
  container.innerHTML="";
  videoIds.forEach((id,index)=>{
    const div=document.createElement("div");
    div.className="video";
    div.innerHTML=`<div id="player-${index}" class="player"></div>`;
    container.appendChild(div);
  });
}

// Iframe API準備完了
function onYouTubeIframeAPIReady(){ fetchShorts(); }

// プレイヤー生成
function loadPlayers(){
  players = videoIds.map((id,index)=>{
    return new YT.Player(`player-${index}`,{
      videoId:id,
      playerVars:{ autoplay:1, controls:0, modestbranding:1, loop:1, playlist:id },
      events:{ 'onReady':(event)=>{
        if(isMuted) event.target.mute(); else event.target.unMute();
      }}
    });
  });

  // IntersectionObserverで完全表示動画のみ再生
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const idx=parseInt(entry.target.querySelector('.player').id.split('-')[1]);
      if(entry.isIntersecting && entry.intersectionRatio>=0.9){
        // 前の動画停止
        if(currentIndex!==-1 && players[currentIndex] && currentIndex!==idx){
          players[currentIndex].pauseVideo();
        }
        currentIndex=idx;
        if(players[idx]){
          if(isMuted) players[idx].mute(); else players[idx].unMute();
          players[idx].playVideo();
        }
        if(idx>=videoIds.length-3) fetchShorts(5);
      }
    });
  },{threshold:0.9});

  document.querySelectorAll('.video').forEach(div=>observer.observe(div));
}

// 音声トグル
const audioBtn=document.getElementById("audio-btn");
audioBtn.addEventListener("click",()=>{
  isMuted=!isMuted;
  audioBtn.textContent=isMuted?"🔇":"🔊";
  if(currentIndex!==-1 && players[currentIndex]){
    if(isMuted) players[currentIndex].mute();
    else players[currentIndex].unMute();
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTube Shorts TikTok風 (日本版)</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    #video-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .video {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      scroll-snap-align: start;
    }

    .player {
      width: 360px;
      height: 640px;
    }
  </style>
</head>
<body>

<div id="video-container"></div>

<!-- YouTube Iframe API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API_KEY = "AIzaSyDxg4ziMu2rbUG8wKR5z9qUfQX_l4iv-Uk"; // ←ここに自分のAPIキー
let players = [];
let videoIds = [];
let currentIndex = 0;

// YouTube APIで日本系ショート動画を取得
async function fetchShorts(maxResults = 10) {
  const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=shorts&type=video&videoDuration=short&maxResults=${maxResults}&regionCode=JP&relevanceLanguage=ja&key=${API_KEY}`
  );
  const data = await res.json();

  const newIds = data.items.map(item => item.id.videoId);
  videoIds = videoIds.concat(newIds);
  shuffle(videoIds);

  renderVideos();
  loadPlayers();
}

// 配列シャッフル
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// DOMに動画プレイヤー追加
function renderVideos() {
  const container = document.getElementById("video-container");
  container.innerHTML = "";
  videoIds.forEach((id, index) => {
    const div = document.createElement("div");
    div.className = "video";
    div.innerHTML = `<div id="player-${index}" class="player"></div>`;
    container.appendChild(div);
  });
}

// YouTube Iframe API準備完了後に呼ばれる
function onYouTubeIframeAPIReady() {
  fetchShorts();
}

// プレイヤー生成
function loadPlayers() {
  players = videoIds.map((id, index) => {
    return new YT.Player(`player-${index}`, {
      videoId: id,
      playerVars: {
        autoplay: 1,
        controls: 0,
        modestbranding: 1,
        loop: 1,
        playlist: id
      },
      events: {
        'onReady': (event) => {
          event.target.mute(); // 自動再生用にミュート
          if (index === 0) event.target.playVideo(); // 最初の動画だけ再生
        }
      }
    });
  });
}

// スクロールで動画切替
document.getElementById("video-container").addEventListener("scroll", () => {
  const container = document.getElementById("video-container");
  const index = Math.round(container.scrollTop / window.innerHeight);

  if (index !== currentIndex && players[index]) {
    if (players[currentIndex]) players[currentIndex].pauseVideo();
    players[index].playVideo();
    currentIndex = index;

    // 無限スクロールで追加取得
    if (index >= videoIds.length - 3) {
      fetchShorts(5); // 少しずつ追加
    }
  }
});
</script>

</body>
</html>
